name: Generate Daily SudoX Puzzles

on:
  schedule:
    # 18:30 UTC is exactly 00:00 IST (Midnight in India)
    - cron: '30 18 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI for testing

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Ensure C++ Compiler is installed
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Run Puzzle Generator
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: npx tsx scripts/generate-daily.ts
