name: Keepalive — Prevent GitHub from disabling scheduled workflows

on:
  schedule:
    # Runs once a week (Sunday at 00:00 UTC) to keep the repo "active"
    # GitHub disables cron workflows after 60 days of no repo activity
    - cron: '0 0 * * 0'

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      actions: write

    steps:
      - name: Keep workflows alive
        uses: actions/github-script@v7
        with:
          script: |
            // Re-enable the daily puzzle generation workflow if GitHub auto-disabled it
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            for (const wf of workflows.data.workflows) {
              if (wf.state === 'disabled_inactivity') {
                console.log(`Re-enabling workflow: ${wf.name} (${wf.id})`);
                await github.rest.actions.enableWorkflow({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: wf.id,
                });
              } else {
                console.log(`Workflow OK: ${wf.name} — state: ${wf.state}`);
              }
            }
